<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Blog/static/css/style.css">
</head>

<body class='landing'>
</body>

<script>
// script.js
document.addEventListener('DOMContentLoaded', function() {
    // 1. Define an array of image URLs
    const images = [
        "/Blog/static/images/landing/2.png",
        "/Blog/static/images/landing/3.png",
        "/Blog/static/images/landing/4.png",
        "/Blog/static/images/landing/5.png",
        "/Blog/static/images/landing/Artboard 1@4x.png",
        "/Blog/static/images/landing/Untitled-1.png",
    ];

    const randomIndex = Math.floor(Math.random() * images.length);
    const selectedImage = images[randomIndex];

    document.body.style.backgroundImage = `url('${selectedImage}')`;

});

document.addEventListener('click', function(event) {
    window.location.href = "/Blog/home";
});

</script>
